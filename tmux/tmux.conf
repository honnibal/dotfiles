######################################################################
# START OF PLUGINS
######################################################################

# Plugin manager for tmux 
set -g @plugin 'tmux-plugins/tpm'

# Simple tmux options for anyone
set -g @plugin 'tmux-plugins/tmux-sensible'

# Gruvbox theme for tmux - powerline support!
set -g @plugin 'egel/tmux-gruvbox'

# Persistent tmux envs across system restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Continuous saving of tmux environment
set -g @plugin 'tmux-plugins/tmux-continuum'

#######################################################
# TMUX-CONTINUUM 
#######################################################

# Restore manually with prefix + Ctrl+R
set -g @continuum-restore 'off'

# How often to save a tmux layout
set -g @continuum-save-interval '1'

#######################################################
# TMUX-RESURRECT
#######################################################

# Capture contents of each pane 
set -g @resurrect-capture-pane-contents 'on'

# Set to resurrect neovim sessions 
set -g @resurrect-strategy-nvim 'session'

#######################################################
# TMUX-SENSIBLE
#######################################################

# Increase scrollback buffer size
set -g history-limit 5000

######################################################################
# END OF PLUGINS
######################################################################




######################################################################
# START OF GENERAL CONFIGURATIONS
######################################################################

# Turn on interactivity with mouse 
set -g mouse on

# Change the position of the status bar
set-option -g status-position bottom

# Start window numbering at specific num
set -g base-index 1          

# Renumber windows on window close
set -g renumber-windows on    

# Small escape delay: fixes arrow keys without breaking backspace
set-option -sg escape-time 10

# True-color support for modern terminals (Ghostty, kitty, etc.)
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-ghostty:RGB'
set-option -sa terminal-overrides ',xterm-256color:RGB'

#######################################################
# KEY BINDING
#######################################################

# Smart split: join previous window, or new pane if no other windows
bind -n C-\\ if-shell '[ #{session_windows} -gt 1 ]' 'join-pane -h -s !' 'split-window -h'
bind -n C-- if-shell '[ #{session_windows} -gt 1 ]' 'join-pane -v -s !' 'split-window -v'
# Always new split
bind \\ split-window -h
bind - split-window -v
# Break pane back to its own window
bind Escape break-pane
# Close window
bind q confirm-before -p "Kill window #W? (y/n)" kill-window
bind Q kill-window
# F-keys go to window N, creating it if it doesn't exist
bind -n F1 if-shell 'tmux select-window -t :1' '' 'new-window -t :1'
bind -n F2 if-shell 'tmux select-window -t :2' '' 'new-window -t :2'
bind -n F3 if-shell 'tmux select-window -t :3' '' 'new-window -t :3'
bind -n F4 if-shell 'tmux select-window -t :4' '' 'new-window -t :4'
# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

#######################################################
# CLIPBOARD
#######################################################

# Use system clipboard for copy/paste
set -g set-clipboard on
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

######################################################################
# END OF GENERAL CONFIGURATIONS
######################################################################




# Initialize tpm plugin manager - DO NOT MOVE
run '~/.tmux/plugins/tpm/tpm'
